<body>
  <div class="container">
    <div class="row" style="margin-top: 10px;">
      <div class="col-sm-12" style="text-align:center;">
        <p class="site-nav">
          <a href="index.html">Home</a> &nbsp;/&nbsp;
          <a href="research-notes.html" class="active">Research Notes</a>
        </p>
        <p style="text-align:center; margin-bottom: 0;">
          <name>Research Notes</name>
        </p>
        <p style="text-align:center; color:#888; margin-top: 6px;">
          A working notebook &mdash; what I'm building, stuck on, and still figuring out.
        </p>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- Pinned index of tech reports / system cards, always at the top. -->
    <div class="row">
      <div class="col">
        <div id="insights-container"></div>
      </div>
    </div>
    <!-- Collapsible note entries (auto-generated). Each note's summary is its index row. -->
    <div class="row">
      <div class="col">
        <div id="notes-container"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col">
        <p style="text-align:right;font-size:small;">
          Template based on <a href="https://jonbarron.info/">Jon Barron's website</a>.
        </p>
      </div>
    </div>
  </div>

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script>
    // ===================================================================
    //  ADD NEW NOTES HERE  ->  create notes/YYYY-MM-DD.md, then add a line.
    //  Order doesn't matter; entries are sorted newest-first automatically.
    // ===================================================================
    const NOTES = [
      { date: "2026-07-10", title: "Skills", file: "notes/2026-07-10-skills.md" },
      { date: "2026-07-10", title: "Inventing the z-axis: synthetic 3D from 2D radiology", file: "notes/2026-07-10-synthetic-3d-radiology.md" },
      { date: "2026-07-07", title: "Teaching a model what happened after its cutoff", file: "notes/2026-07-07-post-cutoff-distillation.md" },
      { date: "2026-07-07", title: "Quantizing a world model onto a wearable", file: "notes/2026-07-07-wearable-world-model.md" },
      { date: "2026-07-07", title: "The energy floor of inference", file: "notes/2026-07-07-energy-floor-inference.md" },
      { date: "2026-07-06", title: "Over-reflection: when the agent already knows the answer", file: "notes/2026-07-06-over-reflection.md" },
      { date: "2026-07-06", title: "AgentPlanet: one world, three roles, one model", file: "notes/2026-07-06.md" },
    ];
    // ===================================================================

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function slugify(s) {
      return s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    }

    // Drop a leading top-level "# Title" so it doesn't duplicate the summary title.
    function stripLeadingH1(md) {
      const lines = md.split("\n");
      let i = 0;
      while (i < lines.length && lines[i].trim() === "") i++;
      if (i < lines.length && /^#\s+/.test(lines[i])) {
        lines.splice(0, i + 1);
        return lines.join("\n");
      }
      return md;
    }

    // Pinned "Insights of Tech Report" section — always the first entry, open by default.
    async function renderInsights() {
      const container = document.getElementById("insights-container");
      const file = "notes/insights-tech-reports.md";

      const details = document.createElement("details");
      details.className = "note-entry";
      details.id = "insights-of-tech-report";
      details.open = true;

      const summary = document.createElement("summary");
      summary.className = "note-summary";
      summary.innerHTML = '<span class="note-date">reports</span>' +
                          '<span class="note-title">Insights of Tech Report</span>';
      details.appendChild(summary);

      const body = document.createElement("div");
      body.className = "note-body";
      try {
        const res = await fetch(file, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const md = await res.text();
        body.innerHTML = marked.parse(stripLeadingH1(md));
      } catch (e) {
        body.innerHTML = "<p style='color:#c0392b;'>Could not load <code>" +
                         escapeHtml(file) + "</code> (" + escapeHtml(String(e.message)) +
                         "). On GitHub Pages this loads fine; opening the file locally via file:// blocks fetch.</p>";
      }
      details.appendChild(body);
      container.appendChild(details);
    }

    async function renderNotes() {
      const sorted = [...NOTES].sort((a, b) => b.date.localeCompare(a.date));
      const container = document.getElementById("notes-container");

      if (sorted.length === 0) {
        container.innerHTML = "<p style='color:#888;'>No notes yet.</p>";
        return;
      }

      for (let i = 0; i < sorted.length; i++) {
        const note = sorted[i];

        // Each note is its own collapsible entry; the summary is the index row.
        const details = document.createElement("details");
        details.className = "note-entry";
        details.id = note.date + "-" + slugify(note.title);
        if (i === 0) details.open = true;   // newest expanded by default

        const summary = document.createElement("summary");
        summary.className = "note-summary";
        summary.innerHTML = '<span class="note-date">' + escapeHtml(note.date) + '</span>' +
                            '<span class="note-title">' + escapeHtml(note.title) + '</span>';
        details.appendChild(summary);

        const body = document.createElement("div");
        body.className = "note-body";
        try {
          const res = await fetch(note.file, { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const md = await res.text();
          body.innerHTML = marked.parse(stripLeadingH1(md));
        } catch (e) {
          body.innerHTML = "<p style='color:#c0392b;'>Could not load <code>" +
                           escapeHtml(note.file) + "</code> (" + escapeHtml(String(e.message)) +
                           "). On GitHub Pages this loads fine; opening the file locally via file:// blocks fetch.</p>";
        }
        details.appendChild(body);
        container.appendChild(details);
      }
    }

    renderInsights();
    renderNotes();
  </script>
</body>
</html>
